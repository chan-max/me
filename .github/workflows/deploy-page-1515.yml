name: Deploy Page to 1515 Directory

on:
  push:
    branches: ["main",'master']
  workflow_dispatch:

jobs:
  deploy-page-1515:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          elif [ -f "package.json" ]; then
            npm install
          else
            echo "No package.json found, skipping dependency installation"
          fi

      - name: Update download links
        run: |
          if [ -f "package.json" ] && npm run | grep -q "update-links"; then
            npm run update-links
          else
            echo "update-links script not found, skipping"
          fi

      - name: Deploy Page to 1515 Directory
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: "page/**"
          target: "/www/wwwroot/49.232.186.238_1515"
          rm: false
          strip_components: 1
          overwrite: true
          command_timeout: "10m"
          timeout: "10m"
          debug: true 